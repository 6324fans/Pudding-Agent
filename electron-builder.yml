appId: com.pudding.agent
productName: Pudding-Agent
artifactName: "Pudding-Agent-${version}-${arch}-${os}.${ext}"
electronVersion: "33.4.11"
npmRebuild: true
afterPack: scripts/after-pack.cjs
directories:
  output: out
  app: packages/electron
  buildResources: assets
files:
  - dist/**/*
  - ui/**/*
  - package.json
  - node_modules/node-pty/**/*
extraResources:
  - from: packages/electron/resources/codegraph
    to: codegraph
publish:
  provider: github
  owner: 6324fans
  repo: Pudding-Agent
mac:
  icon: assets/icon.icns
  category: public.app-category.developer-tools
  extendInfo:
    NSAppleEventsUsageDescription: Pudding-Agent needs to control System Events for Computer Use actions.
    NSAccessibilityUsageDescription: Pudding-Agent needs accessibility access to click, type, scroll, and inspect windows.
    NSScreenCaptureUsageDescription: Pudding-Agent needs screen capture access to inspect the current desktop.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  notarize: false
  target:
    - dmg
    - zip
win:
  icon: assets/icon.ico
  target:
    - nsis
linux:
  icon: assets/icon.png
  target:
    - AppImage
    - deb
